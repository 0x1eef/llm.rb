                  "logprobs": [],
                  "text": "Here are the top news highlights from **Monday, February 23, 2026**:\n\nNASA Artemis II Rollback  \n\u2022 NASA announced plans to roll back the Artemis\u202fII rocket and spacecraft from the launch pad at Kennedy Space Center on **Tuesday, February 24**, due to a detected helium flow issue in the rocket's upper stage. Engineers will inspect and resolve the issue before proceeding with the next launch steps.([m.economictimes.com](https://m.economictimes.com/news/science/nasa-to-roll-back-artemis-ii-rocket-on-february-24-after-helium-issue/articleshow/128695710.cms?utm_source=openai))\n\nHistoric Blizzard in Northeastern U.S.  \n\u2022 A powerful blizzard, unofficially dubbed the **Blizzard of 2026** or **Winter Storm Hernando**, continues to impact the Northeastern United States. The storm has already deposited up to 2 feet of snow, with winds gusting near 60\u202fmph and significant power outages across the region.([en.wikipedia.org](https://en.wikipedia.org/wiki/February_2026_North_American_blizzard?utm_source=openai))\n\nMexico\u2019s Most Wanted Drug Lord Killed  \n\u2022 The Mexican military confirmed that Nemesio \u201cEl\u202fMencho\u201d Oseguera Cervantes, leader of the Jalisco New Generation Cartel (CJNG), was killed in a shootout in Tapalpa, Jalisco, on Sunday. His death has triggered violent unrest, with roads blocked and fires set in parts of western Jalisco.([dynamitenews.com](https://www.dynamitenews.com/national/read-the-top-news-headlines-for-monday-23-february-in-one-click?utm_source=openai))\n\nMar\u2011a\u2011Lago Security Incident  \n\u2022 On **February 22**, Secret Service agents shot and killed a man armed with a shotgun and carrying a fuel can who breached the perimeter of Mar\u2011a\u2011Lago. The incident occurred while former President Trump was not on-site.([en.wikipedia.org](https://en.wikipedia.org/wiki/2026_Mar-a-Lago_shooting?utm_source=openai))\n\nAlaska Earthquake & Nepal Bus Crash  \n\u2022 A **magnitude 6.3 earthquake** struck near Alaska at a very shallow depth (~1\u202fkm), but no tsunami warning was issued.([timesofindia.indiatimes.com](https://timesofindia.indiatimes.com/india/breaking-news-live-updates-february-23/liveblog/128687197.cms?utm_source=openai))  \n\u2022 In Nepal\u2019s Dhading district, a passenger bus plunged into a river, resulting in at least 18 fatalities, and a large-scale rescue effort is underway.([timesofindia.indiatimes.com](https://timesofindia.indiatimes.com/india/breaking-news-live-updates-february-23/liveblog/128687197.cms?utm_source=openai))\n\nWWE RAW Tonight & Wrestling Rumors  \n\u2022 **WWE RAW\u2019s February 23 episode**, airing from Atlanta, serves as the go-home show before the Elimination Chamber event. Highlights include qualifying matches, a tribute to AJ Styles, the return of Brock Lesnar, and Liv Morgan facing a crucial WrestleMania decision.([timesofindia.indiatimes.com](https://timesofindia.indiatimes.com/sports/wwe/top-stories/wwe-raw-preview-and-streaming-details-23-feb-2026-full-match-card-confirmed-segments-start-timings-how-to-watch/articleshow/128701863.cms?utm_source=openai))  \n\u2022 Unconfirmed wrestling rumors mention internal delays in WWE storylines, potential character changes for Lyra Valkyria, and contract negotiations involving AEW\u2019s Britt Baker.([cagesideseats.com](https://www.cagesideseats.com/rumor-round-up/420179/rumor-roundup-feb-23-2026-wwe-delays-lyra-valkyria-change-britt-baker-contract-aew?utm_source=openai))\n\nAstronomy Observation: Moon Meets Pleiades  \n\u2022 Tonight, from approximately **9\u202fp.m. to 1\u202fa.m. EST**, the **Moon will occult (pass in front of)** some of the stars in the Pleiades cluster (M45) in Taurus. With a telescope or binoculars, observers may see stars \u201cwink out\u201d as the Moon\u2019s dark edge covers them.([astronomy.com](https://www.astronomy.com/observing/the-sky-today-monday-february-23-2026/?utm_source=openai))\n\nOther Notable News & Culture  \n\u2022 In India: PM Narendra Modi inaugurated the **Meerut Metro** and the **Namo Bharat Corridor**. Gautam Adani reviewed \u20b943,000 crore in power projects. Amitabh Bachchan became the face of the **Skill India Digital Hub**, and MS Dhoni confirmed participation in **IPL\u202f2026**. Pakistan conducted cross-border strikes in Afghanistan, and Ukraine struck a key Russian missile facility.([m.economictimes.com](https://m.economictimes.com/news/new-updates/school-assembly-news-headlines-february-23-top-national-world-business-sports-defence-updates/articleshow/128678311.cms?utm_source=openai))  \n\u2022 In space news: On **February 17**, an **annular \u201cring of fire\u201d solar eclipse** passed over western Antarctica, with partial visibility in southern Africa and South America. A total lunar eclipse is expected on **March 3**.([space.com](https://www.space.com/news/live/annular-solar-eclipse-february-2026-live-updates?utm_source=openai))  \n\u2022 Entertainment and Lifestyle: Vulture published the latest **Telematrix** pop culture puzzle. Content releases on **HBO Max** and Discovery+ include new originals like *Murder In Glitterball City*, *Portobello*, *Last Week Tonight* Season 13, and *Like Water for Chocolate* Season 2.([vulture.com](https://www.vulture.com/article/daily-tv-grid-trivia-game-telematrix.html?utm_campaign=feed-part&utm_medium=social_acct&utm_source=openai))  \n\u2022 Community & Events: The **Midland, Michigan** region is hosting a variety of community events from now through July, including art exhibits, concerts, workshops, and Symphony performances.([ourmidland.com](https://www.ourmidland.com/lifestyles/article/happening-great-lakes-bay-region-21612640.php?utm_source=openai))  \n\u2022 Horoscopes & Numerology: Daily predictions were available for Capricorn, Leo, as well as numerology readings for numbers 1 through 9.([timesofindia.indiatimes.com](https://timesofindia.indiatimes.com/astrology/horoscope/capricorn-horoscope-today-february-23-2026-maternal-support-offers-comfort-and-guidance/articleshow/128654385.cms?utm_source=openai))\n\n\u2014  \nThese stories reflect the most significant events shaping the day globally\u2014from natural disasters and geopolitical shifts to space phenomena, local happenings, and entertainment trends."
